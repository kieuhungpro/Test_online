<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VNPT Exam Bộ 01</title>
<style>
body{font-family:Arial;margin:0;background:#f3f6fb;color:#1f2937}header{background:#005baa;color:white;text-align:center;padding:22px}main{max-width:1000px;margin:20px auto;padding:0 14px}.card{background:white;border-radius:14px;padding:22px;box-shadow:0 8px 24px #0001;margin-bottom:16px}button{background:#005baa;color:white;border:0;border-radius:10px;padding:11px 16px;font-weight:bold;margin:4px;cursor:pointer}.hidden{display:none}.option{display:block;border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0}.q{font-size:20px;font-weight:bold;white-space:pre-line;line-height:1.45}.head{display:flex;justify-content:space-between;border-bottom:1px solid #ddd;margin-bottom:14px}#timer{font-size:24px;color:#dc2626;font-weight:bold}.correct{border-left:5px solid #16a34a;background:#f0fdf4;padding:10px;margin:10px 0;white-space:pre-line}.wrong{border-left:5px solid #dc2626;background:#fef2f2;padding:10px;margin:10px 0;white-space:pre-line}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:8px}
</style></head><body><header><h1>VNPT Hà Nội - Luyện thi Java</h1><p>Bộ 01: Java Core + OOP</p></header>
<main><section id="home" class="card"><h2 id="title"></h2><p id="info"></p><button onclick="start()">Bắt đầu</button><button onclick="stats()">Thống kê</button><div id="stat"></div></section>
<section id="quiz" class="card hidden"><div class="head"><div><h2 id="qt"></h2><p id="prog"></p></div><div id="timer">60:00</div></div><div id="box"></div><button onclick="prev()">Câu trước</button><button onclick="next()">Câu sau</button><button onclick="submit()">Nộp bài</button></section>
<section id="result" class="card hidden"><h2>Kết quả</h2><div id="score"></div><div id="review"></div><button onclick="location.reload()">Làm lại</button></section></main>
<script src="questions.js"></script><script>
let day=(window.QUIZ_DAYS&&window.QUIZ_DAYS[0])||{title:'Bộ đề',duration:60,questions:window.QUESTIONS||[]};
let qs=day.questions, ans=[], i=0, left=(day.duration||60)*60, t=null;
title.innerText=day.title; info.innerText='Số câu: '+qs.length+' | Thời gian: '+(day.duration||60)+' phút';
function start(){ans=Array(qs.length).fill(null);home.classList.add('hidden');quiz.classList.remove('hidden');qt.innerText=day.title;t=setInterval(tick,1000);render()}
function tick(){left--;let m=Math.floor(left/60),s=left%60;timer.innerText=m+':'+String(s).padStart(2,'0');if(left<=0)submit()}
function render(){let q=qs[i];prog.innerHTML='Câu '+(i+1)+'/'+qs.length+' - <b>'+(q.topic||q.category||'')+'</b>';box.innerHTML='<div class="q">'+(i+1)+'. '+q.question+'</div>'+q.options.map((o,k)=>'<label class="option"><input type="radio" name="o" value="'+k+'" '+(ans[i]===k?'checked':'')+'> '+String.fromCharCode(65+k)+'. '+o+'</label>').join('');document.querySelectorAll('input[name=o]').forEach(e=>e.onchange=()=>ans[i]=Number(e.value))}
function prev(){if(i>0){i--;render()}} function next(){if(i<qs.length-1){i++;render()}}
function submit(){clearInterval(t);let ok=0,rv='';qs.forEach((q,k)=>{let pass=ans[k]===q.answer;if(pass)ok++;rv+='<div class="'+(pass?'correct':'wrong')+'"><b>Câu '+(k+1)+'.</b> '+q.question+'<br>Chọn: '+(ans[k]==null?'Chưa chọn':String.fromCharCode(65+ans[k]))+' | Đúng: '+String.fromCharCode(65+q.answer)+'<br><i>'+q.explain+'</i></div>'});quiz.classList.add('hidden');result.classList.remove('hidden');score.innerHTML='<h3>Điểm: '+ok+'/'+qs.length+' ('+Math.round(ok/qs.length*100)+'%)</h3>';review.innerHTML=rv}
function stats(){let a=[0,0,0,0];qs.forEach(q=>a[q.answer]++);stat.innerHTML='<p>Phân bố đáp án: A='+a[0]+', B='+a[1]+', C='+a[2]+', D='+a[3]+'</p>'}
</script></body></html>
